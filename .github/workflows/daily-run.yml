# The Phase 1 daily run. One invocation per day; the orchestrator is
# idempotent, so a manual re-dispatch on the same day can never double-trade.
#
# Pausing the bot: either disable this workflow in the Actions UI (fastest),
# or commit a KILL_SWITCH file to the repo root — the orchestrator checks it
# before any action, every run.
#
# A failed run exits nonzero -> the workflow fails -> GitHub emails Harry.
# The failure outcome is also committed into the run log (ledger.db) so the
# weekly report's reliability line sees it.

name: daily-run

on:
  schedule:
    - cron: "30 7 * * *"  # 07:30 UTC daily
  workflow_dispatch: {}

concurrency:
  group: daily-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Daily run (stdlib only, no dependencies)
        env:
          # optional CoinGecko demo key; raises rate limits from shared CI IPs
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python -m ledger.orchestrator

      - name: Commit the ledger (even after a failed run — the outcome row matters)
        if: always()
        run: |
          git config user.name "ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ledger.db
          if git diff --cached --quiet; then
            echo "no ledger changes to commit"
            exit 0
          fi
          git commit -m "Daily run: $(date -u +%F)"
          git pull --rebase origin main
          git push
