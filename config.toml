# Ledger configuration — every tunable lives here, never in code (CLAUDE.md).
# All *_pct values are human-readable percentages: 0.40 means 0.40%, 60 means 60%.

[portfolio]
starting_capital_gbp = 500.00
allocation_crypto_pct = 60
allocation_stocks_pct = 40
drift_threshold_pts = 10

[trading]
per_trade_cap_pct_of_sleeve = 20
min_trade_gbp = 50.00
max_proposals_per_day = 1
max_proposals_per_week = 5

# Strategy v1 (spec §6, kept deliberately boring): 50-day MA trend filter gates
# DCA accumulation; RSI tilts the size. Buys only — rebalancing is flagged by
# the risk manager for Harry to decide, never traded automatically.

[strategy]
ma_days = 50
rsi_period = 14
base_trade_gbp = 60.00
rsi_oversold = 30
rsi_overbought = 70
oversold_tilt = 1.5   # size multiplier when RSI <= rsi_oversold (dip in an uptrend)
overbought_tilt = 0.5 # size multiplier when RSI >= rsi_overbought (frothy)

[fx]
# One-way GBP<->USD conversion cost applied to every trade on a non-GBP venue.
# Estimate based on Wise/bank retail FX margin; revisit when Phase 2 picks a real rail.
conversion_cost_pct = 0.50

[runtime]
db_path = "ledger.db"
kill_switch_path = "KILL_SWITCH"

# Tracked assets per sleeve. Each asset names its execution venue; crypto
# assets also need their CoinGecko id for price data.

[assets.crypto.BTC]
coingecko_id = "bitcoin"
venue = "kraken"

# PLACEHOLDER — Harry to confirm the tech/AI ETF choice before Phase 1 day one;
# the benchmark snapshot locks it in permanently.
[assets.stocks.QQQ]
venue = "alpaca"

# Venue fee schedules verified 2026-07-03 (see NOTES.md for sources).
# spread_pct is the estimated FULL bid-ask spread; the fill engine charges half per side.

[venues.kraken]
quote_currency = "GBP"
maker_fee_pct = 0.25
taker_fee_pct = 0.40
spread_pct = 0.10
sell_regulatory_fee_pct = 0.0

[venues.coinbase]
quote_currency = "GBP"
maker_fee_pct = 0.40
taker_fee_pct = 0.60
spread_pct = 0.15
sell_regulatory_fee_pct = 0.0

[venues.alpaca]
quote_currency = "USD"
maker_fee_pct = 0.0
taker_fee_pct = 0.0
spread_pct = 0.05
# SEC section 31 fee on sale proceeds ($27.80 per $1M); FINRA TAF is negligible at this size.
sell_regulatory_fee_pct = 0.00278
