# Ledger configuration — every tunable lives here, never in code (CLAUDE.md).
# All *_pct values are human-readable percentages: 0.40 means 0.40%, 40 means 40%.
#
# v1.2 (Harry, 2026-07-03): crypto-only, five-asset universe with per-asset
# target weights replacing the old 60/40 crypto/stocks sleeves.

[portfolio]
starting_capital_gbp = 500.00
drift_threshold_pts = 10

[trading]
per_trade_cap_pct_of_asset = 20
min_trade_gbp = 50.00
max_proposals_per_day = 1
max_proposals_per_week = 5

# Strategy v1 (spec §6, kept deliberately boring): 50-day MA trend filter gates
# DCA accumulation; RSI tilts the size. Buys only — rebalancing is flagged by
# the risk manager for Harry to decide, never traded automatically.

[strategy]
ma_days = 50
rsi_period = 14
base_trade_gbp = 60.00
rsi_oversold = 40
rsi_overbought = 70
oversold_tilt = 1.5   # size multiplier when RSI <= rsi_oversold (dip in an uptrend)
overbought_tilt = 0.5 # size multiplier when RSI >= rsi_overbought (frothy)

[fx]
# One-way GBP<->USD conversion cost applied to any trade on a non-GBP pair.
conversion_cost_pct = 0.50

[runtime]
db_path = "ledger.db"
kill_switch_path = "KILL_SWITCH"

# The universe. Weights must sum to 100. quote_currency / spread_pct are per
# PAIR (spread is the estimated full bid-ask; the fill engine charges half per
# side; estimates recorded in NOTES.md). Kraken listings verified 2026-07-03:
# BTC/ETH/SOL/SUI trade in GBP directly; HYPE is USD-quoted (listed 2026-01-28)
# so it carries the FX conversion cost.

[assets.BTC]
coingecko_id = "bitcoin"
venue = "kraken"
quote_currency = "GBP"
spread_pct = 0.10
target_weight_pct = 40

[assets.ETH]
coingecko_id = "ethereum"
venue = "kraken"
quote_currency = "GBP"
spread_pct = 0.15
target_weight_pct = 25

[assets.SOL]
coingecko_id = "solana"
venue = "kraken"
quote_currency = "GBP"
spread_pct = 0.20
target_weight_pct = 15

[assets.SUI]
coingecko_id = "sui"
venue = "kraken"
quote_currency = "GBP"
spread_pct = 0.40
target_weight_pct = 10

[assets.HYPE]
coingecko_id = "hyperliquid"
venue = "kraken"
quote_currency = "USD"
spread_pct = 0.30
target_weight_pct = 10

# Venue fee schedules (fees only — pair-level costs live on the asset).
# Verified 2026-07-03; see NOTES.md for sources.

[venues.kraken]
maker_fee_pct = 0.25
taker_fee_pct = 0.40
sell_regulatory_fee_pct = 0.0

[venues.coinbase]
maker_fee_pct = 0.40
taker_fee_pct = 0.60
sell_regulatory_fee_pct = 0.0
